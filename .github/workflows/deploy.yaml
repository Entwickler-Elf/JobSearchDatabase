name: Build, Push, Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}
  CONTAINER_NAME: jobsearch-database
  CONTAINER_PORT: "8080"
  DOCKER_NETWORK: jobsearch-network
  HOST_PORT: "8080"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute image ref (lowercase)
        id: meta
        run: |
          set -euo pipefail
          IMAGE_REF="$(echo "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" | tr '[:upper:]' '[:lower:]')"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v5.1.0
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build & Push image (Jib)
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests clean package jib:build -Ppush-image \
            -Dimage=${{ steps.meta.outputs.image_ref }} \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Stop and remove existing container
        run: |
          docker stop "${{ env.CONTAINER_NAME }}" || true
          docker rm "${{ env.CONTAINER_NAME }}" || true

      - name: Pull image
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
        run: |
          docker pull "${IMAGE_REF}"          

      - name: Deploy on cyclops via SSH
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
        run: |
          docker pull "${IMAGE_REF}"


      - name: Run new container
        run: |
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            --restart always \
            --network ${{ env.DOCKER_NETWORK }} \
            -e SPRING_PROFILES_ACTIVE=dev \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://${{ secrets.POSTGRES_HOST }}:5432/jobhunt \
            -e SPRING_DATASOURCE_USERNAME=${{ secrets.POSTGRES_USER }} \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            "${IMAGE_REF}"

          sleep 5
          if [ "$(docker inspect -f '{{.State.Running}}' jobsearch-database)" != "true" ]; then
            docker logs jobsearch-database
            exit 1
          fi

      - name: Cleanup old images
        run: docker image prune -f
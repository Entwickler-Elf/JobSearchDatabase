name: Build, Push, Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}
  CONTAINER_NAME: jobsearch-database
  CONTAINER_PORT: "8080"
  HOST_PORT: "8080"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image ref (lowercase)
        id: meta
        run: |
          set -euo pipefail
          IMAGE_REF="$(echo "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" | tr '[:upper:]' '[:lower:]')"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build & Push image (Jib)
        run: |
          chmod +x mvnw
          ./mvnw -B -DskipTests clean package jib:build -Ppush-image \
            -Dimage=${{ steps.meta.outputs.image_ref }} \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, zeus]
    steps:
      - name: Deploy on cyclops via SSH
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          CYCLOPS_HOST: ${{ secrets.CYCLOPS_HOST }}
          CYCLOPS_USER: ${{ secrets.CYCLOPS_USER }}
          CYCLOPS_SSH_KEY: ${{ secrets.CYCLOPS_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$CYCLOPS_SSH_KEY" > ~/.ssh/cyclops_key
          chmod 600 ~/.ssh/cyclops_key

          ssh -i ~/.ssh/cyclops_key -o StrictHostKeyChecking=accept-new "$CYCLOPS_USER@$CYCLOPS_HOST" "
            set -euo pipefail
            docker pull '$IMAGE_REF'
            docker stop '${CONTAINER_NAME}' || true
            docker rm '${CONTAINER_NAME}' || true
            docker run -d \
              --name '${CONTAINER_NAME}' \
              --restart always \
              -p '${HOST_PORT}:${CONTAINER_PORT}' \
              '$IMAGE_REF'
          "
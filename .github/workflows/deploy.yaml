name: Build and Push Image

on:
  push:
    branches:
      - master

env:
  DOCKER_CONTAINER: jobsearch-database
  JAVA_VERSION: '21.0.2'
  REGISTRY: ghcr.io
  CONTAINER_PORT: 8080
  DOCKER_NETWORK: phoenix-network

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set image metadata
        id: meta
        run: |
          # Use git SHA for image tag for immutability and traceability
          IMAGE_TAG="${{ github.sha }}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=$(echo ${{ env.REGISTRY }}/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5.2.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        run: |
          chmod +x mvnw
          ./mvnw test --batch-mode --fail-at-end

      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests --batch-mode -Ppush-image

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image with Jib
        run: |
          chmod +x mvnw
          ./mvnw jib:build \
            -Dimage=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -Djib.container.ports=${{ env.CONTAINER_PORT }} \
            --batch-mode

      - name: Image digest
        run: |
          echo "Built and pushed image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

  deploy:
    name: Deploy Container
    needs: build-and-push
    runs-on:
      - ubuntu-latest
    environment: production
    steps:
      - name: Set image variables
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image-tag }}"
          echo "IMAGE_NAME=$(echo ${{ env.REGISTRY }}/${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Validate required secrets
        run: |
          : "${POSTGRES_HOST:?POSTGRES_HOST not set}"
          : "${POSTGRES_USER:?POSTGRES_USER not set}"
          : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}"
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Create Docker Network
        run: |
          docker network create ${{ env.DOCKER_NETWORK }} 2>/dev/null || true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        timeout-minutes: 10

      - name: Stop and remove existing container
        run: |
          docker stop ${{ env.DOCKER_CONTAINER }} 2>/dev/null || true
          docker rm ${{ env.DOCKER_CONTAINER }} 2>/dev/null || true

      - name: Run new container
        run: |
          docker run -d \
            --name ${{ env.DOCKER_CONTAINER }} \
            --restart always \
            --network ${{ env.DOCKER_NETWORK }} \
            -e SPRING_PROFILES_ACTIVE=production \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://${{ secrets.POSTGRES_HOST }}:5432/jobhunt \
            -e SPRING_DATASOURCE_USERNAME=${{ secrets.POSTGRES_USER }} \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --health-cmd='curl -f http://localhost:${{ env.CONTAINER_PORT }}/actuator/health || exit 1' \
            --health-interval=30s \
            --health-timeout=10s \
            --health-retries=3 \
            --health-start-period=40s \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

          # Wait for container to be healthy
          sleep 10
          for i in {1..30}; do
            if docker inspect -f '{{.State.Running}}' ${{ env.DOCKER_CONTAINER }} | grep -q true; then
              echo "Container is running"
              if docker inspect -f '{{.State.Health.Status}}' ${{ env.DOCKER_CONTAINER }} 2>/dev/null | grep -q healthy; then
                echo "Container is healthy"
                exit 0
              fi
            fi
            echo "Waiting for container to be healthy... (attempt $i/30)"
            sleep 2
          done

          echo "Container failed to start or become healthy"
          docker logs ${{ env.DOCKER_CONTAINER }}
          exit 1

      - name: Verify deployment
        run: |
          echo "Container ${{ env.DOCKER_CONTAINER }} is running successfully"
          docker ps -f name=${{ env.DOCKER_CONTAINER }}

      - name: Cleanup old images
        run: |
          docker image prune -af --filter "until=24h"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed. Consider manual rollback."
          docker logs ${{ env.DOCKER_CONTAINER }} | tail -50
          exit 1